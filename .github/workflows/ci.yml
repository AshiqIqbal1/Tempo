name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install taglib
        run: sudo apt-get update && sudo apt-get install -y libtagc0-dev
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Build
        working-directory: backend
        run: go build ./...
      - name: Vet
        working-directory: backend
        run: go vet ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Dependencies
        working-directory: frontend
        run: flutter pub get
      - name: Analyze
        working-directory: frontend
        run: flutter analyze
